---
- name: Create manifests directory on first master
  file:
    path: /var/lib/rancher/k3s/server/manifests
    state: directory
    owner: root
    group: root
    mode: 0644
  when: ansible_hostname == hostvars[groups[group_name_master | default('master')][0]]['ansible_hostname']

- name: "Download to first master: manifest for portainer"
  ansible.builtin.get_url:
    url: "https://downloads.portainer.io/ce2-19/portainer-agent-k8s-lb.yaml"  # noqa yaml[line-length]
    dest: "/var/lib/rancher/k3s/server/manifests/portainer.yaml"
    owner: root
    group: root
    mode: 0644
  when: ansible_hostname == hostvars[groups[group_name_master | default('master')][0]]['ansible_hostname']
