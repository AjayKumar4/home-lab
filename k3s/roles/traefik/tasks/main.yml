---
# Add Traefik Helm repository
    - name: Add Traefik Helm repository
      helm:
        repository: helm.traefik.io/traefik
        state: present
        update: true

    # Create Traefik namespace
    - name: Create Traefik namespace
      kubernetes:
        namespace: traefik
        state: present

    # Deploy Traefik using Helm chart with values from file
    - name: Deploy Traefik using Helm chart
      helm:
        chart: traefik/traefik
        namespace: traefik
        release: traefik
        values: traefik-values.yml

    # Check Traefik pods status
    - name: Check Traefik pods status
      kubernetes:
        state: present
        resource: pod
        namespace: traefik
        register: traefik_pods

    - name: Verify Traefik pods are running
      assert:
        that:
          - traefik_pods.pods | length > 0
          - traefik_pods.pods | map('state.phase') | count('Running') == traefik_pods.pods | length

    # Print Traefik pods information
    - name: Print Traefik pods information
      debug:
        msg: "{{ traefik_pods.pods }}"