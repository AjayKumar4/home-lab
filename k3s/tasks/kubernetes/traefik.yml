---
- name: Install Traefik
  hosts: control_plane
  gather_facts: false
  become: true

  vars_files:
    - ../../config.yml

  environment:
    # The location of the kubeconfig file on the master.
    K8S_AUTH_KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    PATH: "~/go/bin:{{ ansible_env.PATH }}"

  tasks:
  - name: Add Traefik Helm repository
    kubernetes.core.helm_repository:
      name: traefik
      repo_url: "https://helm.traefik.io/traefik"
      state: present
    
  - name: Deploy Traefik Helm chart
    kubernetes.core.helm:
      name: traefik
      chart_ref: traefik/traefik
      release_namespace: traefik
      create_namespace: true
      update_repo_cache: true
      wait: yes
      timeout: "{{ helm_time_out }}"
      state: present
      values:
        additionalArguments:
          - "--metrics.prometheus=true"
        metrics:
          prometheus:
            service:
              enabled: true
        service:
          spec:
            # Set load balancer external IP
            loadBalancerIP: "{{ traefik_load_balancer_ip }}"
        providers:
          # Enable cross namespace references
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: true
          # Enable published service
          kubernetesIngress:
            publishedService:
              enabled: true

  - name: Apply Ingress dashboard
    kubernetes.core.k8s:
      state: present
      definition: |
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: dashboard
          namespace: traefik
          annotations: 
            external-dns.alpha.kubernetes.io/hostname: "{{ traefik_dashboard_domain }}"
            external-dns.alpha.kubernetes.io/ttl: "120" #optional
            external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        spec:
          entryPoints:
            - web
          routes:
            - match: Host(`"{{ traefik_dashboard_domain }}"`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
              kind: Rule
              services:
                - name: api@internal
                  kind: TraefikService
          tls:
            secretName: traefik-tls

  - name: Issue Let's Encrypt certificate
    kubernetes.core.k8s:
      definition:
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: traefik-certificate
          namespace: traefik
        spec:
          secretName: traefik-tls
          dnsNames:
            - "{{ traefik_dashboard_domain }}"
          issuerRef:
            name: cloudflare-issuer
            kind: Issuer
            group: cert-manager.io
      state: present

