---
- name: Install Traefik
  hosts: control_plane
  gather_facts: false
  become: true

  vars_files:
    - ../../config.yml

  environment:
    # The location of the kubeconfig file on the master.
    K8S_AUTH_KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    PATH: "~/go/bin:{{ ansible_env.PATH }}"

  tasks:
  - name: Add Traefik Helm repository
    kubernetes.core.helm_repository:
      name: traefik
      repo_url: "https://helm.traefik.io/traefik"
      state: present
    
  - name: Deploy Traefik Helm chart
    kubernetes.core.helm:
      name: traefik
      chart_ref: traefik/traefik
      release_namespace: traefik
      create_namespace: true
      update_repo_cache: true
      wait: yes
      timeout: "{{ helm_time_out }}"
      state: present
      values:
        globalArguments:
          - '--global.checknewversion=false'
          - '--global.sendanonymoususage=false'
        additionalArguments:
          - '--serversTransport.insecureSkipVerify=true'
          - '--log.level=INFO'
        deployment:
          enabled: true
          replicas: 3
          annotations: {}
          podAnnotations: {}
          additionalContainers: []
          initContainers: []
        ports:
          web:
            redirectTo: websecure
          websecure:
            tls:
              enabled: true
        ingressRoute:
          dashboard:
            enabled: false
        providers:
          kubernetesCRD:
            enabled: true
            ingressClass: traefik-external
          kubernetesIngress:
            enabled: true 
            publishedService:
              enabled: false 
        rbac:
          enabled: true
        service:
          enabled: true 
          type: LoadBalancer
          annotations: {}
          labels: {}
          spec:
            loadBalancerIP: "{{ traefik_load_balancer_ip }}"
          loadBalancerSourceRanges: []
          externalIPs: []

  - name: Apply default header
    kubernetes.core.k8s:
      state: present
      definition: |
        apiVersion: traefik.containo.us/v1alpha1
        kind: Middleware
        metadata:
          name: default-headers
          namespace: default
        spec:
          headers:
            browserXssFilter: true
            contentTypeNosniff: true
            forceSTSHeader: true 
            stsIncludeSubdomains: true
            stsPreload: true
            stsSeconds: 15552000
            customFrameOptionsValue: SAMEORIGIN
            customRequestHeaders:
              X-Forwarded-Proto: https

  - name: Generate hashed password
    ansible.builtin.shell: htpasswd -nb {{ ansible_user }} {{ ansible_sudo_pass }} | openssl base64
    register: hashed_password_output

  - name: Set variable with base64-encoded password
    set_fact:
      traefik_dashboard_secert: "{{ hashed_password_output.stdout }}"

  - name: Apply dashboard secert
    kubernetes.core.k8s:
      state: present
      definition: |
        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: traefik-dashboard-auth
          namespace: traefik
        type: Opaque
        data:
          users: "{{ traefik_dashboard_secert }}"

  - name: Apply traefik Middleware
    kubernetes.core.k8s:
      state: present
      definition: |
        apiVersion: traefik.containo.us/v1alpha1
        kind: Middleware
        metadata:
          name: traefik-dashboard-basicauth
          namespace: traefik
        spec:
          basicAuth:
            secret: traefik-dashboard-auth

  - name: Apply Ingress dashboard
    kubernetes.core.k8s:
      state: present
      definition: |
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: traefik-dashboard
          namespace: traefik
          annotations: 
            external-dns.alpha.kubernetes.io/hostname: "{{ traefik_dashboard_domain }}"
            external-dns.alpha.kubernetes.io/ttl: "120" #optional
            external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
            kubernetes.io/ingress.class: traefik-external
        spec:
          entryPoints:
            - websecure
          routes:
            - match: Host(`"{{ traefik_dashboard_domain }}"`)
              kind: Rule
              middlewares:
                - name: traefik-dashboard-basicauth
                  namespace: traefik
              services:
                - name: api@internal
                  kind: TraefikService
          tls:
            secretName:  cloudflare-tls


