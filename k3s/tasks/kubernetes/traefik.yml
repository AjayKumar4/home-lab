---
- name: Install Traefik
  hosts: control_plane
  gather_facts: false
  become: true

  vars_files:
    - ../../config.yml

  environment:
    # The location of the kubeconfig file on the master.
    K8S_AUTH_KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    PATH: "~/go/bin:{{ ansible_env.PATH }}"

  tasks:
  - name: Add Traefik Helm repository
    kubernetes.core.helm_repository:
      name: traefik
      repo_url: "https://helm.traefik.io/traefik"
      state: present
    
  - name: Deploy Traefik Helm chart
    kubernetes.core.helm:
      name: traefik
      chart_ref: traefik/traefik
      release_namespace: traefik
      create_namespace: true
      update_repo_cache: true
      wait: yes
      timeout: "{{ helm_time_out }}"
      state: present
      values:
        additionalArguments:
          - "--metrics.prometheus=true"
        metrics:
          prometheus:
            service:
              enabled: true
        service:
          spec:
            # Set load balancer external IP
            loadBalancerIP: "{{ traefik_load_balancer_ip }}"
        providers:
          # Enable cross namespace references
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: true
          # Enable published service
          kubernetesIngress:
            publishedService:
              enabled: true

  - name: Issue Let's Encrypt certificate
    kubernetes.core.k8s:
      definition:
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: traefik-certificate
          namespace: traefik
        spec:
          secretName: traefik-tls
          dnsNames:
            - "{{ traefik_dashboard_domain }}"
          issuerRef:
            name: cloudflare-issuer
            kind: Issuer
            group: cert-manager.io
      state: present

  - name: Create Traefik dashboard service
    kubernetes.core.k8s:
      definition:
        apiVersion: v1
        kind: Service
        metadata:
          name: traefik-dashboard
          namespace: traefik
          labels:
            app.kubernetes.io/instance: traefik
            app.kubernetes.io/name: traefik
            app.kubernetes.io/component: traefik-dashboard
        spec:
          type: ClusterIP
          ports:
            - name: traefik
              port: 9000
              targetPort: traefik
              protocol: TCP
          selector:
            app.kubernetes.io/instance: traefik
            app.kubernetes.io/name: traefik
      state: present

  - name: Create Traefik HTTPS Ingress
    kubernetes.core.k8s:
      definition:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: traefik-ingress
          namespace: traefik
          annotations:
            # HTTPS as entry point
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            # Enable TLS
            traefik.ingress.kubernetes.io/router.tls: "true"
            # Use Basic Auth Midleware configured
            traefik.ingress.kubernetes.io/router.middlewares: traefik-basic-auth@kubernetescrd
            # Enable cert-manager to create automatically the SSL certificate and store in Secret
            cert-manager.io/cluster-issuer: ca-issuer
            cert-manager.io/common-name: "{{ traefik_dashboard_domain }}"
        spec:
          tls:
            - hosts:
                - "{{ traefik_dashboard_domain }}"
              secretName: traefik-tls
          rules:
            - host: "{{ traefik_dashboard_domain }}"
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: traefik-dashboard
                        port:
                          number: 9000
      state: present

  - name: Create Traefik http ingress for http->https redirection
    kubernetes.core.k8s:
      definition:
        kind: Ingress
        apiVersion: networking.k8s.io/v1
        metadata:
          name: traefik-redirect
          namespace: traefik
          annotations:
            # Use redirect Midleware configured
            traefik.ingress.kubernetes.io/router.middlewares: traefik-redirect@kubernetescrd
            # HTTP as entrypoint
            traefik.ingress.kubernetes.io/router.entrypoints: web
        spec:
          rules:
            - host: "{{ traefik_dashboard_domain }}"
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: traefik-dashboard
                        port:
                          number: 9000
      state: present