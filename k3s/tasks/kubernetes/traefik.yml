---
- name: Install Traefik
  hosts: control_plane
  gather_facts: false
  become: true

  vars_files:
    - ../../config.yml

  environment:
    # The location of the kubeconfig file on the master.
    K8S_AUTH_KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    PATH: "~/go/bin:{{ ansible_env.PATH }}"

  tasks:
  - name: Add Traefik Helm repository
    kubernetes.core.helm_repository:
      name: traefik
      repo_url: "https://helm.traefik.io/traefik"
      state: present
    
  - name: Deploy Traefik Helm chart
    kubernetes.core.helm:
      name: traefik
      chart_ref: traefik/traefik
      release_namespace: traefik
      create_namespace: true
      update_repo_cache: true
      wait: yes
      timeout: "{{ helm_time_out }}"
      state: present
      values:
        additionalArguments:
          - "--metrics.prometheus=true"
        metrics:
          prometheus:
            service:
              enabled: true
        service:
          spec:
            # Set load balancer external IP
            loadBalancerIP: "{{ traefik_load_balancer_ip }}"
        providers:
          # Enable cross namespace references
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: true
          # Enable published service
          kubernetesIngress:
            publishedService:
              enabled: true
        ingressRoute:
          dashboard:
            enabled: true
            annotations:
              external-dns.alpha.kubernetes.io/hostname: "{{ traefik_dashboard_domain }}"
              external-dns.alpha.kubernetes.io/ttl: "120" #optional
              external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
            # Custom match rule with host domain
            matchRule: Host(`"{{ traefik_dashboard_domain }}"`) && PathPrefix(`/dashboard`) || PathPrefix(`/api`)
            entryPoints: ["traefik"]
            # Add custom middlewares : authentication and redirection
            middlewares:
              - name: traefik-dashboard-auth
        # Create the custom middlewares used by the IngressRoute dashboard (can also be created in another way).
        # /!\ Yes, you need to replace "changeme" password with a better one. /!\
        extraObjects:
          - apiVersion: v1
            kind: Secret
            metadata:
              name: traefik-dashboard-auth-secret
            type: kubernetes.io/basic-auth
            stringData:
              username: "{{ ansible_user}}"
              password: "{{ ansible_sudo_pass }}"
          - apiVersion: traefik.io/v1alpha1
            kind: Middleware
            metadata:
              name: traefik-dashboard-auth
            spec:
              basicAuth:
                secret: traefik-dashboard-auth-secret
        tlsStore:
          default:
            defaultCertificate:
              secretName: cloudflare-tls
